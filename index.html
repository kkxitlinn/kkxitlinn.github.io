<!DOCTYPE html>

<html lang="en">
 <head>
     <link rel="stylesheet" href="style.css">
     <title>Pawttention!</title>
     <script defer src="script.js"></script>
 </head>

<body>

            <h1>Pawttention!</h1>
    <main class="wrap">
        <section class="focusArea">
            <!-- Focus timer area -->
            <h2 class="focusTitle">Focus Timer</h2>
            <div class="focusBtns">
                <button class="btnStart">Start</button>
                <button class="btnPause">Pause</button>
                <button class="btnEnd">End</button>
                <button class="btnOptions">Options</button>
            </div>
        </section>

        <section class="petArea">
            <!-- Pet section -->
            <h3 class="petTitle">Onyx</h3>

            <div class="heartsContainer" id="heartsContainer">
                </div>

            <div class="hungerContainer" id="hungerContainer">
                </div>
                
            <img src="images/onyx.png" alt="Onyx the cat" class="onyxImage">
            
            <div class="petBtns">
                <button class="btnFeed">Feed</button>
            </div>

        </section>
        <section class="taskArea">
            <!-- Task section -->
            <h2 class="tasksTitle">Tasks</h2>
            
            <input type="text" class="taskInput" placeholder="Add a new task!">
            <button class="btnAdd">Add</button>
        </section>

    </main>
 </body>
